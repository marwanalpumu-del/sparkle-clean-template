<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkleClean | نظام التنظيف الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-theme="dark">

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo-group">
                <div class="s-box">S</div>
                <div class="brand-name">SPARKLE<span>CLEAN</span></div>
            </div>
            
            <nav class="nav-links" id="navLinks">
                <a href="#home">الرئيسية</a>
                <a href="#services">خدماتنا</a>
                <a href="#results">النتائج</a>
                <a href="#" onclick="openPrivacy(event)">الخصوصية</a>
                <button id="themeToggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </nav>

            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <main id="home">
        <section class="hero-section">
            <div class="container hero-grid">
                <div class="hero-text">
                    <h1 class="fade-in">تجربة نظافة استثنائية</h1>
                    <p>نظام ذكي يجمع بين الدقة التكنولوجية والرفاهية العصرية كما في أجهزة MacBook و iPhone.</p>
                </div>

                <div class="estimator-card glass">
                    <h3>حاسبة التكلفة الذكية</h3>
                    <div class="input-row">
                        <select id="currencySelect">
                            <option value="SAR" data-rate="3.75" data-symbol="ر.س">ريال سعودي</option>
                            <option value="USD" data-rate="1" data-symbol="$">دولار أمريكي</option>
                        </select>
                        <input type="number" id="inputArea" placeholder="المساحة م2" value="100">
                    </div>
                    <div class="display-box"><span id="priceDisplay">0 ريال</span></div>
                    <div class="policy-check">
                        <input type="checkbox" id="acceptPolicy">
                        <label for="acceptPolicy">أوافق على سياسة الخصوصية</label>
                    </div>
                    <a href="#" id="checkoutBtn" class="btn-primary btn-disabled">احجز الآن عبر واتساب</a>
                </div>
            </div>
        </section>

        <section id="results" class="results-section container">
            <h2 class="section-title">نتائج العمل (قبل وبعد)</h2>
            <div class="comparison-wrapper glass">
                <div class="image-wrapper">
                    <img src="assets/images/after.webp" alt="بعد">
                    <div class="before-overlay">
                        <img src="assets/images/before.webp" alt="قبل">
                    </div>
                    <input type="range" min="0" max="100" value="50" class="slider-bar" id="comparisonSlider">
                    <div class="slider-button"></div>
                </div>
            </div>
        </section>
    </main>

    <button id="backToTop" class="back-to-top"><i class="fas fa-chevron-up"></i></button>

    <script src="assets/js/main.js"></script>
</body>
</html>
