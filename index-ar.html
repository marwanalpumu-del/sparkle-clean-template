<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سباركل كلين | النظام الذكي</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-theme="dark">

    <header>
        <div class="logo-group">
            <div class="s-box">S</div>
            <div class="brand-name">SPARKLE<span>CLEAN</span></div>
        </div>
        
        <div class="header-actions">
            <nav class="desktop-nav">
                <a href="index.html" class="lang-link">English</a>
                <label class="theme-switch">
                    <input type="checkbox" id="modeToggle">
                    <span class="slider"></span>
                </label>
            </nav>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <div class="mobile-overlay" id="mobileOverlay"></div>
    <nav class="mobile-menu" id="mobileMenu">
        <button class="menu-close" id="menuClose"><i class="fas fa-times"></i></button>
        <a href="index.html">English</a>
        <a href="#home">الرئيسية</a>
        <a href="#services">خدماتنا</a>
    </nav>

    <main class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">تجربة نظافة استثنائية</h1>
            <p class="hero-subtitle">نظام ذكي متكامل مصمم لتقديم أرقى خدمات التنظيف الاحترافية.</p>
            
            <div class="calc-card glass">
                <h3>خاصية التكلفة</h3>
                <label>المساحة م2 (متر مربع)</label>
                <input type="number" id="areaInput" value="120" min="1">
                <div class="price-box">
                    <small>التكلفة التقديرية</small>
                    <h2 id="totalPrice">600 ريال</h2>
                </div>
                <button class="order-btn" id="orderBtn">اطلب الآن</button>
            </div>
        </div>
    </main>

    <a href="#" class="whatsapp-float" id="whatsappLink" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
    <button id="backToTop" class="back-to-top">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script src="assets/js/main.js"></script>
</body>
</html>
