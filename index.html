<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkleClean | Elite Smart System</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-theme="dark">

    <header>
        <div class="logo-group">
            <div class="s-box">S</div>
            <div class="brand-name">SPARKLE<span>CLEAN</span></div>
        </div>
        <div class="header-actions">
            <nav class="desktop-nav">
                <a href="index-ar.html" class="lang-link">العربية</a>
                <label class="theme-switch">
                    <input type="checkbox" id="modeToggle">
                    <span class="slider"></span>
                </label>
            </nav>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <div class="mobile-overlay" id="mobileOverlay"></div>
    <nav class="mobile-menu" id="mobileMenu">
        <button class="menu-close" id="menuClose"><i class="fas fa-times"></i></button>
        <a href="index-ar.html" style="color: var(--primary);">العربية</a>
        <a href="index.html">Home</a>
        <a href="success.html">Booking Status</a>
        <a href="404.html">Support</a>
    </nav>

    <main class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">Elite Experience</h1>
            <p class="hero-subtitle">Premium smart cleaning for luxury modern homes.</p>
            
            <div class="calc-card glass">
                <h3>Cost Estimator</h3>
                <input type="number" id="areaInput" value="120" min="1">
                <div class="price-box">
                    <small>Estimated Price</small>
                    <h2 id="totalPrice">600 SAR</h2>
                </div>
                <button class="order-btn" id="orderBtn">Book Now</button>
            </div>

            <div class="comparison-container glass">
                <div class="image-wrapper">
                    <img src="assets/images/after.webp" alt="After">
                    <div class="before-overlay">
                        <img src="assets/images/before.webp" alt="Before">
                    </div>
                    <input type="range" min="0" max="100" value="50" class="slider-bar" id="comparisonSlider">
                    <div class="slider-button"></div>
                </div>
            </div>
        </div>
    </main>

    <a href="#" class="whatsapp-btn whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
    <button id="backToTop" class="back-to-top"><i class="fas fa-chevron-up"></i></button>

    <script src="assets/js/main.js"></script>
</body>
</html>
