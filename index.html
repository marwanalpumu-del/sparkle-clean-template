<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkleClean System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-theme="dark">

    <header>
        <div class="logo-group">
            <div class="s-box">S</div>
            <div class="brand-name">SPARKLE<span>CLEAN</span></div>
        </div>
        
        <nav class="nav-menu">
            <a href="#home">Home</a>
            <a href="#services">Services</a>
            <a href="#results">Results</a>
            <a href="#testimonials">Testimonials</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
            <span class="lang-switch">العربية</span>
            <label class="switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
        </nav>
    </header>

    <section id="home" class="main-banner">
        <div class="overlay"></div>
        <div class="content">
            <h1 id="heroTitle">تجربة نظافة استثنائية</h1>
            <p id="heroDesc">استمتع بمنزل نظيف تماماً مع خدمات احترافية تضمن لك الجودة والراحة التامة.</p>
            <button class="btn-main">احجز الآن</button>
            
            <div class="calculator-box">
                <h3 id="calcTitle">خاصية التكلفة</h3>
                <p id="calcHint">المساحة م2 (متر مربع)</p>
                <input type="number" id="areaInput" value="120">
                <div class="result-box">
                    <span id="resultLabel">التكلفة التقديرية</span>
                    <h2 id="totalPrice">600 ريال</h2>
                </div>
                <button class="btn-submit">اطلب الآن</button>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>
</html>
