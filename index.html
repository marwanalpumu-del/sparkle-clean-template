<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkleClean | Premium Cleaning System</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="preloader">
        <div class="loader-spinner"></div>
    </div>

    <header>
        <div class="logo">SPARKLE<span>CLEAN</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#results">Results</a></li>
            </ul>
        </nav>
        <button id="langBtn" class="lang-btn">العربية</button>
    </header>

    <main>
        <section class="hero">
            <h1>Experience Sparkling Excellence</h1>
            <p>Premium professional cleaning for modern homes.</p>
        </section>

        <section class="estimator">
            <div class="estimator-container">
                <h3><i class="fas fa-calculator"></i> Cost Estimator</h3>
                
                <div class="input-group">
                    <label for="inputArea">Area (sq/m)</label>
                    <input type="number" id="inputArea" placeholder="e.g. 120" min="0">
                </div>

                <div class="result-box">
                    <p>Estimated Total</p>
                    <span id="priceDisplay">0 SAR</span>
                </div>

                <div class="policy-area">
                    <input type="checkbox" id="acceptPolicy">
                    <label for="acceptPolicy">I agree to terms & policy</label>
                </div>

                <button id="checkoutBtn" class="secure-btn">
                    Secure Booking <i class="fas fa-shield-alt"></i>
                </button>
            </div>
        </section>

        <section class="services" id="services">
            <div class="services-grid">
                <div class="service-card">
                    <i class="fas fa-home"></i>
                    <h3>Residential</h3>
                </div>
                <div class="service-card">
                    <i class="fas fa-building"></i>
                    <h3>Office</h3>
                </div>
                <div class="service-card">
                    <i class="fas fa-broom"></i>
                    <h3>Deep Clean</h3>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
