<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkleClean | نظام حجز خدمات التنظيف الذكي</title>
    
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <meta name="description" content="نظام حجز ذكي لشركات التنظيف في الخليج">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="#" class="logo">
                <div class="logo-icon">S</div>
                <div class="logo-text">SPARKLE<span>CLEAN</span></div>
            </a>
            <nav class="nav-links">
                <a href="#home">الرئيسية</a>
                <a href="#results">أعمالنا</a>
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="tIcon"></i></button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero" id="home">
            <div class="hero-grid">
                <div class="hero-info">
                    <h1 class="hero-title">نظافة منزلك <br> تعكس رقيّك</h1>
                    <p class="hero-p">نظام ذكي متكامل لحساب التكلفة وحجز المواعيد الفورية لدول الخليج.</p>
                </div>

                <div class="calc-card">
                    <h3>حاسبة السعر والعملات</h3>
                    
                    <div class="input-group">
                        <label>المساحة الإجمالية (م2)</label>
                        <input type="number" id="area" value="100" oninput="runEngine()">
                    </div>

                    <div class="input-group">
                        <label>اختر العملة المحلية</label>
                        <select id="curr" onchange="runEngine()">
                            <option value="SAR" data-rate="1">الريال السعودي (SAR)</option>
                            <option value="AED" data-rate="0.98">الدرهم الإماراتي (AED)</option>
                            <option value="KWD" data-rate="0.082">الدينار الكويتي (KWD)</option>
                            <option value="QAR" data-rate="0.97">الريال القطري (QAR)</option>
                            <option value="BHD" data-rate="0.10">الدينار البحريني (BHD)</option>
                            <option value="OMR" data-rate="0.10">الريال العماني (OMR)</option>
                            <option value="USD" data-rate="0.266">الدولار الأمريكي (USD)</option>
                        </select>
                    </div>

                    <div class="price-box">
                        <div class="price-tag" id="display">0 SAR</div>
                    </div>

                    <div class="check-box">
                        <input type="checkbox" id="agree" onchange="validate()">
                        <label for="agree">أوافق على سياسة الخدمة والسعر</label>
                    </div>

                    <button class="btn-primary" id="btnMain" onclick="goToWA()" disabled>
                        <i class="fab fa-whatsapp"></i> حجز عبر واتساب
                    </button>
                    <button class="btn-secondary" onclick="generateQuote()">
                        <i class="fas fa-file-pdf"></i> تحميل فاتورة PDF
                    </button>
                </div>
            </div>
        </section>

        <section class="comparison" id="results">
            <h2>جودة نضمنها بالنتائج</h2>
            <div class="slider-box">
                <img src="assets/images/results.webp" class="img-after">
                <div class="img-before" id="beforeWrap">
                    <img src="assets/images/results.webp" style="filter: grayscale(100%) contrast(1.2);">
                </div>
                <input type="range" min="0" max="100" value="50" class="slider-ui" id="scroller">
                <div class="slider-button" id="handle"><i class="fas fa-arrows-alt-h"></i></div>
            </div>
        </section>
    </main>

    <a href="#" class="wa-float" id="waFloat"><i class="fab fa-whatsapp"></i></a>

    <script src="assets/js/main.js"></script>
</body>
</html>
